services:
  traefik:
    container_name: traefik
    image: traefik:v3.6
    restart: unless-stopped
    command:
      # Optimization: Further reduced log level from INFO to WARN to decrease CPU/IO overhead per request.
      - "--log.level=WARN"
      # Optimization: Set max idle connections per host to match global limit (8000) to maximize backend connection reuse for individual backends.
      - "--serverstransport.maxidleconnsperhost=8000"
      # Optimization: Scale global connection pooling to 8000 to allow more concurrent backend connections across multiple backends.
      - "--serverstransport.maxidleconns=8000"
      # Optimization: Set forwarding timeouts to fail fast on unreachable backends and prevent hanging on headers.
      # dialtimeout is reduced to 100ms as backends are on the same internal network.
      - "--serverstransport.forwardingtimeouts.dialtimeout=100ms"
      # Optimization: Tighten response header timeout to 1s to fail fast on slow backends.
      - "--serverstransport.forwardingtimeouts.responseheadertimeout=1s"
      # Optimization: Further reduce idle connection timeout to 2s for faster resource reclamation on internal networks.
      - "--serverstransport.forwardingtimeouts.idleconntimeout=2s"
      # Optimization: Narrow Docker provider scope to the primary network to reduce overhead during service discovery.
      - "--providers.docker.network=rubofvil_lan"
      # Optimization: Apply Docker provider filtering to only watch containers with 'traefik.enable=true' label.
      # This reduces CPU and memory usage by filtering events and metadata at the Docker API level.
      - "--providers.docker.filters=label=traefik.enable=true"
      # Optimization: Disable version check to reduce unnecessary outbound requests on startup.
      - "--global.checknewversion=false"
      # Optimization: Disable anonymous usage statistics to reduce unnecessary outbound network requests and minor processing overhead.
      - "--global.sendanonymoususage=false"
      # Optimization: Enable allowemptyservices to prevent full configuration reloads and CPU spikes
      # when a service temporarily has no active containers (e.g. during updates).
      - "--providers.docker.allowemptyservices=true"
      # Optimization: Enable dashboard mode to allow routing via the main entrypoint with compression.
      - "--api.dashboard=true"
      # Security: Disable insecure mode to prevent unauthorized access to the API and dashboard.
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.http.address=:80"
      # Optimization: Tighten idle timeout to 2s to reclaim resources faster.
      - "--entrypoints.http.transport.respondingtimeouts.idletimeout=2s"
      # Optimization: Tighten read and write timeouts to 5s to prevent resource exhaustion from hanging connections.
      - "--entrypoints.http.transport.respondingtimeouts.readtimeout=5s"
      - "--entrypoints.http.transport.respondingtimeouts.writetimeout=5s"
      # Optimization: Tighten read header timeout to 250ms to prevent resource exhaustion from slow-reading clients.
      - "--entrypoints.http.transport.respondingtimeouts.readheadertimeout=250ms"
      # Optimization: Increase max concurrent streams for HTTP/2 to 1000 to allow more parallel requests per connection.
      - "--entrypoints.http.http2.maxconcurrentstreams=1000"
      # Optimization: Enable global compression for all routers on the http entrypoint.
      # This reduces bandwidth usage and improves load times for all services by default.
      - "--entrypoints.http.http.middlewares=compress@docker"
      - "--entrypoints.ssh.address=:22"
    labels:
      - "traefik.enable=true"
      # Optimization: Expose the dashboard via a router on the http entrypoint.
      # This ensures it benefits from global compression, improving performance for remote management.
      - "traefik.http.routers.dashboard.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=http"
      # Security: Add authentication to the dashboard router.
      # Optimization: Redundant 'compress@docker' removed as it is already applied globally at the entrypoint level.
      - "traefik.http.routers.dashboard.middlewares=auth@docker"
      # Security: Basic auth middleware definition.
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"
      # Global compression middleware definition.
      # Optimization: Prefer more efficient compression algorithms (zstd, br) and lower threshold (256B)
      # to improve performance for modern clients and small JSON payloads.
      - "traefik.http.middlewares.compress.compress.encodings=zstd,br,gzip"
      - "traefik.http.middlewares.compress.compress.minResponseBodyBytes=256"
    ulimits:
      # Optimization: Increase the maximum number of open files (nofile) to 65535.
      # This is critical for high-concurrency proxies like Traefik to handle thousands of concurrent
      # connections without "too many open files" errors, improving scalability and reliability under load.
      nofile:
        soft: 65535
        hard: 65535
    ports:
      - 80:80
      - 22:22
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - rubofvil_lan
    deploy:
      resources:
        # Optimization: Resource reservations ensure Traefik always has a minimum CPU/Memory allocation.
        # This prevents performance degradation and "starvation" when other containers compete for resources.
        reservations:
          cpus: '0.25'
          memory: 128M
        limits:
          cpus: '0.75'
          memory: 512M
    environment:
      # Optimization: Set GOMAXPROCS to match the CPU limit to reduce context-switching overhead.
      - GOMAXPROCS=1
      # Optimization: Set GOMEMLIMIT to 90% of the memory limit to optimize GC and prevent OOM kills.
      - GOMEMLIMIT=460MiB
      # Optimization: Set GOGC to 200 to reduce GC frequency and CPU overhead when memory is available.
      # GOMEMLIMIT provides a safety net to prevent OOM.
      - GOGC=200

  portainer:
    container_name: portainer
    image: portainer/portainer-ce:2.6.0-alpine
    command:
      - "-H"
      - "unix:///var/run/docker.sock"
      # Optimization: Increase snapshot interval from default 5m to 1h to reduce background Docker socket polling.
      - "--snapshot-interval=1h"
      # Optimization: Disable anonymous usage statistics to reduce unnecessary outbound network requests and background processing.
      - "--no-analytics"
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer_data:/data
    labels:
      traefik.enable: true
      traefik.http.routers.portainer.rule: Host(`portainer.localhost`)
      traefik.http.routers.portainer.entrypoints: http
      traefik.http.routers.portainer.service: portainer
      traefik.http.services.portainer.loadBalancer.server.port: 9000
    ulimits:
      # Optimization: Increase nofile limits to handle higher concurrency and prevent connection failures.
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - rubofvil_lan
    environment:
      # Optimization: Set GOMAXPROCS to match the CPU limit (0.50) to reduce context-switching overhead and improve Go runtime efficiency.
      - GOMAXPROCS=1
      # Optimization: Set GOGC to 200 to reduce CPU cycles spent on garbage collection by allowing the heap to grow larger before triggering a collection.
      - GOGC=200
    deploy:
      resources:
        # Optimization: Portainer resource reservations ensure it remains responsive and prevents starvation
        # during high system load.
        reservations:
          cpus: '0.10'
          memory: 128M
        limits:
          cpus: '0.50'
          memory: 256M


networks:
  rubofvil_lan:
    external: true
