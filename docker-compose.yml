services:
  traefik:
    container_name: traefik
    image: traefik:v3.6
    restart: unless-stopped
    command:
      # Optimization: Further reduced log level from INFO to WARN to decrease CPU/IO overhead per request.
      - "--log.level=WARN"
      # Optimization: Increase max idle connections per host to improve backend connection reuse and reduce latency.
      - "--serverstransport.maxidleconnsperhost=250"
      # Optimization: Scale global connection pooling to allow more concurrent backend connections.
      - "--serverstransport.maxidleconns=1000"
      # Optimization: Set forwarding timeouts to fail fast on unreachable backends and prevent hanging on headers.
      # dialtimeout is reduced to 2s as backends are on the same internal network.
      - "--serverstransport.forwardingtimeouts.dialtimeout=2s"
      - "--serverstransport.forwardingtimeouts.responseheadertimeout=30s"
      # Optimization: Narrow Docker provider scope to the primary network to reduce overhead during service discovery.
      - "--providers.docker.network=rubofvil_lan"
      # Optimization: Disable version check and anonymous usage statistics to reduce unnecessary outbound requests on startup.
      - "--global.checknewversion=false"
      - "--global.sendanonymoususage=false"
      # Optimization: Enable dashboard mode to allow routing via the main entrypoint with compression.
      - "--api.dashboard=true"
      # Security: Disable insecure mode to prevent unauthorized access to the API and dashboard.
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.http.address=:80"
      # Optimization: Reduce idle timeout, read timeout and write timeout to free up resources from inactive or hanging connections faster.
      - "--entrypoints.http.transport.respondingtimeouts.idletimeout=60s"
      # Optimization: Set read and write timeouts to prevent resource exhaustion from hanging connections.
      - "--entrypoints.http.transport.respondingtimeouts.readtimeout=60s"
      - "--entrypoints.http.transport.respondingtimeouts.writetimeout=60s"
      # Optimization: Enable global compression for all routers on the http entrypoint.
      # This reduces bandwidth usage and improves load times for all services by default.
      - "--entrypoints.http.http.middlewares=compress@docker"
      - "--entrypoints.ssh.address=:22"
    labels:
      - "traefik.enable=true"
      # Optimization: Expose the dashboard via a router on the http entrypoint.
      # This ensures it benefits from global compression, improving performance for remote management.
      - "traefik.http.routers.dashboard.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=http"
      # Security: Add authentication to the dashboard router.
      # Optimization: Redundant 'compress@docker' removed as it is already applied globally at the entrypoint level.
      - "traefik.http.routers.dashboard.middlewares=auth@docker"
      # Security: Basic auth middleware definition (admin:admin).
      - "traefik.http.middlewares.auth.basicauth.users=admin:$$apr1$$H697SpgL$$763AgmxuKCYm77U07l9p2."
      # Global compression middleware definition.
      - "traefik.http.middlewares.compress.compress=true"
    ulimits:
      # Optimization: Increase the maximum number of open files (nofile) to 65535.
      # This is critical for high-concurrency proxies like Traefik to handle thousands of concurrent
      # connections without "too many open files" errors, improving scalability and reliability under load.
      nofile:
        soft: 65535
        hard: 65535
    ports:
      - 80:80
      - 22:22
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - rubofvil_lan
    deploy:
      resources:
        # Optimization: Resource reservations ensure Traefik always has a minimum CPU/Memory allocation.
        # This prevents performance degradation and "starvation" when other containers compete for resources.
        reservations:
          cpus: '0.25'
          memory: 128M
        limits:
          cpus: '0.75'
          memory: 512M
    environment:
      # Optimization: Set GOMAXPROCS to match the CPU limit to reduce context-switching overhead.
      - GOMAXPROCS=1
      # Optimization: Set GOMEMLIMIT to 90% of the memory limit to optimize GC and prevent OOM kills.
      - GOMEMLIMIT=460MiB
      # Optimization: Set GOGC to 200 to reduce GC frequency and CPU overhead when memory is available.
      # GOMEMLIMIT provides a safety net to prevent OOM.
      - GOGC=200

  portainer:
    container_name: portainer
    image: portainer/portainer-ce:2.6.0-alpine
    command:
      - "-H"
      - "unix:///var/run/docker.sock"
      # Optimization: Increase snapshot interval from default 5m to 1h to reduce background Docker socket polling.
      - "--snapshot-interval=1h"
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer_data:/data
    labels:
      traefik.enable: true
      traefik.http.routers.portainer.rule: Host(`portainer.localhost`)
      traefik.http.routers.portainer.entrypoints: http
      traefik.http.routers.portainer.service: portainer
      traefik.http.services.portainer.loadBalancer.server.port: 9000
    ulimits:
      # Optimization: Increase nofile limits to handle higher concurrency and prevent connection failures.
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - rubofvil_lan
    environment:
      # Optimization: Set GOMAXPROCS to match the CPU limit (0.50) to reduce context-switching overhead and improve Go runtime efficiency.
      - GOMAXPROCS=1
      # Optimization: Set GOGC to 200 to reduce CPU cycles spent on garbage collection by allowing the heap to grow larger before triggering a collection.
      - GOGC=200
    deploy:
      resources:
        # Optimization: Portainer resource reservations ensure it remains responsive and prevents starvation
        # during high system load.
        reservations:
          cpus: '0.10'
          memory: 128M
        limits:
          cpus: '0.50'
          memory: 256M


networks:
  rubofvil_lan:
    external: true
